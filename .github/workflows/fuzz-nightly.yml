name: jseek nightly fuzz

on:
  schedule:
    - cron: "0 4 * * *" # daily at 04:00 UTC
  workflow_dispatch: {}

defaults:
  run:
    working-directory: jseek

jobs:
  fuzz:
    name: ${{ matrix.target }} (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        target:
          - FuzzGetAgainstStdlib
          - FuzzDocumentMatchesGet
          - FuzzTapeMatchesGet
          - FuzzEachKeyMatchesGet
          - FuzzEachDocMatchesEachKey
          - FuzzSetAgainstStdlib
          - FuzzDeleteAgainstStdlib
          - FuzzStreamMatchesArrayEach
          - FuzzStreamBytesMatchesDecoder
          - FuzzPinMatchesGet
          - FuzzTransposeMatchesGet
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache-dependency-path: jseek/go.mod

      - name: Fuzz ${{ matrix.target }}
        run: go test -run=x -fuzz=${{ matrix.target }} -fuzztime=10m ./...

      - name: Upload crashers
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-corpus-${{ matrix.target }}-${{ matrix.os }}
          path: jseek/testdata/fuzz/${{ matrix.target }}/
